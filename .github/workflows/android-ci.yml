name: 🤖 Android CI/CD - Su Takip App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'

jobs:
  # 🔍 Kod Analizi ve Testler
  test:
    name: 🧪 Test & Analyze
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔍 Analyze code
      run: flutter analyze --no-fatal-infos
      
    - name: 🧪 Run tests
      run: flutter test test/unit_test.dart

  # 🏗️ Android Build
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Setup Gradle Cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: 🔧 Build APK
      run: |
        flutter clean
        flutter pub get
        flutter build apk --release --verbose
      
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
    - name: 📊 APK Info
      run: |
        echo "## 📱 Android APK Build Başarılı! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Build Bilgileri:" >> $GITHUB_STEP_SUMMARY
        echo "- **Flutter Version:** ${{ env.FLUTTER_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Java Version:** ${{ env.JAVA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type:** Release APK" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          size=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "- **APK Size:** $size" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ APK başarıyla oluşturuldu ve artifacts'a yüklendi!" >> $GITHUB_STEP_SUMMARY

  # 🚀 Firebase App Distribution
  deploy-firebase:
    name: 🚀 Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'  # Ana branch'e push olduğunda çalışır
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: ./
        
    - name: 🚀 Deploy to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        groups: testers
        file: app-release.apk
        releaseNotes: |
          🚀 Su Takip App - Yeni Sürüm!
          
          📝 Son Değişiklikler:
          ${{ github.event.head_commit.message }}
          
          📊 Build Bilgileri:
          • Flutter: ${{ env.FLUTTER_VERSION }}
          • Build: #${{ github.run_number }}
          • Commit: ${{ github.sha }}
          • Branch: ${{ github.ref_name }}
          
          📱 Test için uygulamayı indirin ve geri bildirimlerinizi paylaşın!
          
          🔗 GitHub: https://github.com/${{ github.repository }}/commit/${{ github.sha }}