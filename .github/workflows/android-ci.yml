name: 🤖 Android CI/CD - Su Takip App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: "Manuel tetikleme nedeni (opsiyonel)"
        required: false
        default: "manual run"

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'

jobs:
  # 🔍 Kod Analizi ve Testler
  test:
    name: 🧪 Test & Analyze
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔍 Analyze code
      run: flutter analyze --no-fatal-infos
      
    - name: 🧪 Run tests
      run: flutter test test/unit_test.dart

  # 🏗️ Android Build
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true

    - name: 🔎 Resolve Flutter SDK path and write local.properties
      shell: bash
      run: |
        set -e
        FLUTTER_BIN="$(which flutter)"
        echo "flutter bin: $FLUTTER_BIN"
        FLUTTER_HOME="$(dirname "$(dirname "$FLUTTER_BIN")")"
        echo "Detected FLUTTER_HOME=$FLUTTER_HOME"
        mkdir -p android
        {
          echo "flutter.sdk=$FLUTTER_HOME"
          echo "flutter.buildMode=debug"
        } > android/local.properties
        cat android/local.properties
        echo "FLUTTER_HOME=$FLUTTER_HOME" >> $GITHUB_ENV
         
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Setup Gradle Cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 🔧 Create .env file for CI
      run: |
        echo "# CI Environment Variables" > .env
        echo "FLUTTER_ENV=production" >> .env
        echo "API_BASE_URL=https://api.example.com" >> .env
        
    - name: 🛠️ Write absolute flutter.source to gradle.properties
      shell: bash
      run: |
        set -e
        echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
        # flutter.source mutlak yol olsun (plugin add-to-app modunda 'source' arıyor)
        if grep -q '^flutter.source=' android/gradle.properties; then
          sed -i.bak "s#^flutter.source=.*#flutter.source=$GITHUB_WORKSPACE#g" android/gradle.properties
        else
          echo "flutter.source=$GITHUB_WORKSPACE" >> android/gradle.properties
        fi
        echo "---- android/gradle.properties ----"
        cat android/gradle.properties
        echo "-----------------------------------"

    - name: 🔧 Build APK
      run: |
        flutter clean
        flutter pub get
        flutter build apk --debug
      
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        
    - name: 📊 APK Info
      run: |
        echo "## 📱 Android APK Build Başarılı! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Build Bilgileri:" >> $GITHUB_STEP_SUMMARY
        echo "- **Flutter Version:** ${{ env.FLUTTER_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Java Version:** ${{ env.JAVA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type:** Debug APK" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
          size=$(du -h build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
          echo "- **APK Size:** $size" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ APK başarıyla oluşturuldu ve artifacts'a yüklendi!" >> $GITHUB_STEP_SUMMARY

  # 🚀 Firebase App Distribution
  deploy-firebase:
    name: 🚀 Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'  # Ana branch'e push olduğunda çalışır
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: ./
        
    - name: 🚀 Deploy to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        groups: testers
        file: app-debug.apk
        releaseNotes: |
          🚀 Su Takip App - Yeni Sürüm!
          
          📝 Son Değişiklikler:
          ${{ github.event.head_commit.message }}
          
          📊 Build Bilgileri:
          • Flutter: ${{ env.FLUTTER_VERSION }}
          • Build: #${{ github.run_number }}
          • Commit: ${{ github.sha }}
          • Branch: ${{ github.ref_name }}
          
          📱 Test için uygulamayı indirin ve geri bildirimlerinizi paylaşın!
          
          🔗 GitHub: https://github.com/${{ github.repository }}/commit/${{ github.sha }}