name: 🚀 CI/CD Pipeline - Su Takip App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'

jobs:
  # 🔍 Kod Analizi ve Testler
  analyze-and-test:
    name: 📊 Analyze & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔍 Analyze code
      run: flutter analyze --no-fatal-infos
      
    - name: 🧪 Run tests
      run: flutter test --coverage
      continue-on-error: true
      
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        fail_ci_if_error: false

  # 🏗️ Android Build
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Build APK
      run: |
        flutter build apk --release \
          --split-per-abi \
          --obfuscate \
          --split-debug-info=build/debug-info/
          
    - name: 🔧 Build AAB
      run: |
        flutter build appbundle --release \
          --obfuscate \
          --split-debug-info=build/debug-info/
          
    - name: 📤 Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/*.apk
        
    - name: 📤 Upload AAB artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-aab
        path: build/app/outputs/bundle/release/*.aab

  # 🍎 iOS Build (macOS runner gerekli)
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Build iOS (No Codesign)
      run: |
        flutter build ios --release --no-codesign
        
    - name: 📤 Upload iOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build/ios/iphoneos/Runner.app

  # 🌐 Web Build
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Build Web
      run: |
        flutter build web --release \
          --web-renderer canvaskit \
          --base-href /su-takip/
          
    - name: 📤 Upload Web artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/

  # 🪟 Windows Build
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: 📦 Get dependencies
      run: flutter pub get
      
    - name: 🔧 Build Windows
      run: |
        flutter build windows --release
        
    - name: 📤 Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: build/windows/x64/runner/Release/

  # 🚀 Firebase App Distribution (Android)
  deploy-android:
    name: 🚀 Deploy Android to Firebase
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download APK artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/
        
    - name: 🚀 Deploy to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        groups: testers
        file: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        releaseNotes: |
          🚀 Yeni sürüm hazır!
          
          📱 Bu sürümde:
          - Performans iyileştirmeleri
          - Hata düzeltmeleri
          - Yeni özellikler
          
          🔗 Commit: ${{ github.sha }}
          📅 Tarih: ${{ github.event.head_commit.timestamp }}

  # 📊 Build Analizi
  build-analysis:
    name: 📊 Build Analysis
    runs-on: ubuntu-latest
    needs: [build-android, build-web]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: android-build/
        
    - name: 📥 Download Web artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: web-build/
        
    - name: 📊 Analyze build sizes
      run: |
        echo "## 📊 Build Size Analysis" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Size | File |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|------|------|" >> $GITHUB_STEP_SUMMARY
        
        # Android APK sizes
        for apk in android-build/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            filename=$(basename "$apk")
            echo "| Android | $size | $filename |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        
        # Web build size
        if [ -d "web-build" ]; then
          size=$(du -sh web-build | cut -f1)
          echo "| Web | $size | build/ |" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🎯 **Hedef:** APK < 50MB, Web < 10MB" >> $GITHUB_STEP_SUMMARY

  # 🔔 Bildirim
  notify:
    name: 🔔 Notify
    runs-on: ubuntu-latest
    needs: [deploy-android, build-analysis]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
    - name: 🔔 Success Notification
      if: needs.deploy-android.result == 'success'
      run: |
        echo "✅ Su Takip App başarıyla deploy edildi!"
        echo "🚀 Firebase App Distribution'da test için hazır"
        
    - name: ❌ Failure Notification
      if: needs.deploy-android.result == 'failure'
      run: |
        echo "❌ Deploy işlemi başarısız!"
        echo "🔍 Logları kontrol edin"